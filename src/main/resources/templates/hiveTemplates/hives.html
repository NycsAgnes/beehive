<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hives</title>
    <link rel="stylesheet" th:href="@{/stylesheets/hive_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="hive-body">

<div class="main-container">
    <h1 class="page-title">🐝 Apiary 🐝</h1>
    <div class="button-container">
        <a th:href="@{/web/hives/new}" class="morph-btn btn-nav btn-action btn-left">
            <span class="btn-icon">✚</span>
            <span class="btn-text">Build New Hive</span>
        </a>
        <a th:href="@{/web/bees}" class="morph-btn btn-nav btn-navi btn-right">
            <span class="btn-icon">❯</span>
            <span class="btn-text">Bee Registry Office</span>
        </a>
    </div>
    <ul class="honeycomb-grid">

        <li class="honeycomb-cell" th:each="hive : ${hives}">
            <a th:href="@{/web/hives/{id}(id=${hive.id})}" class="honeycomb-link">

                <div th:if="${#lists.isEmpty(hive.bees)}"
                     class="honeycomb-image"
                     th:style="'background-image: url(/images/hiveImages/emptie.png); filter: grayscale(100%);'">
                </div>

                <div th:unless="${#lists.isEmpty(hive.bees)}"
                     class="honeycomb-image"
                     th:style="'background-image: url(/images/hiveImages/happie.png);'">
                </div>

                <div class="honeycomb-text">
                    <h3 th:text="${hive.hiveName}">Hive 1</h3>

                    <div class="pop-badge">
                        🐝 <span th:text="${hive.bees.size()}">0</span>
                    </div>
                </div>
            </a>
            <form th:action="@{/web/hives/delete/{id}(id=${hive.id})}" method="post" class="delete-form">
                <button type="submit" class="delete-icon"
                        onclick="return confirm('Are you sure you want to demolish this hive? The inhabitants will be homeless!')">
                    🗑️
                </button>
            </form>
        </li>
    </ul>
</div>

</body>
</html>
