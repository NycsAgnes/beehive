<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width initial-scale=1.0">
    <title>Hives</title>
    <link rel="stylesheet" th:href="@{/stylesheets/hiveStyles/hive_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="hive-body">

<div class="main-container">
    <h1 class="page-title">🐝 Méhészet 🐝</h1>

    <div style="text-align: center; margin-bottom: 40px;">
        <a th:href="@{/web/hives/new}" class="btn-new-hive">+ Új Kaptár Építése</a>
    </div>

    <ul class="honeycomb-grid">

        <li class="honeycomb-cell" th:each="hive : ${hives}">
            <a th:href="@{/web/hives/{id}(id=${hive.id})}" class="honeycomb-link">

                <div th:if="${#lists.isEmpty(hive.bees)}"
                     class="honeycomb-image"
                     th:style="'background-image: url(/images/hiveImages/emptie.png); filter: grayscale(100%);'">
                </div>

                <div th:unless="${#lists.isEmpty(hive.bees)}"
                     class="honeycomb-image"
                     th:style="'background-image: url(/images/hiveImages/happie.png);'">
                </div>

                <div class="honeycomb-text">
                    <h3 th:text="${hive.hiveName}">Kaptár 1</h3>

                    <div class="pop-badge">
                        🐝 <span th:text="${hive.bees.size()}">0</span>
                    </div>
                </div>
            </a>
        </li>

        <li class="honeycomb-cell placeholder"></li>
    </ul>
</div>

</body>
</html>
